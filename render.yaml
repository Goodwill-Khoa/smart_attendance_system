services:
  - type: web
    name: smart-attendance-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPERUSER_KEY
        sync: false
      - key: DEFAULT_LECTURER_PASSWORD
        sync: false
      - key: SUPERUSER_USERNAME
        sync: false
      - key: SUPERUSER_PASSWORD
        sync: false
